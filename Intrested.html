<!DOCTYPE html>
<html>
<head>
    <title>Impresed with Sample Template ?| Contact Us </title>
    
    <style>
        /* Add to styles.css */

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #001f3f, #0074D9);
    color: white;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: rgba(255,255,255,0.08);
    padding: 30px;
    border-radius: 14px;
    text-align: center;
}

input[type="text"],
input[type="email"] {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    font-size: 1em;
    background: rgba(255,255,255,0.15);
    color: #fff;
}

input[type="text"]::placeholder,
input[type="email"]::placeholder {
    color: #d0e6f7;
}

button[type="submit"] {
    padding: 12px 28px;
    background: #00ccff;
    color: white;
    border-radius: 8px;
    border: none;
    font-weight: bold;
    font-size: 1em;
    margin-top: 10px;
    cursor: pointer;
    transition: background 0.3s;
}

button[type="submit"]:hover {
    background: #0099cc;
}

.thankyou {
    display: none;
    margin-top: 30px;
}

.thankyou .wave {
    font-size: 2em;
    animation: wave 1s infinite alternate;
}
h1 {
    margin-bottom: 10px;
}
footer {
  margin-top: auto;
  text-align: center;
  color: #fbfbfb;
  padding: 16px 0;
  border-top: 1px solid #1c1c1d;
}


@keyframes wave {
    0% { transform: rotate(0deg);}
    100% { transform: rotate(20deg);}
}
        .thankyou {
            display: none;
            margin-top: 30px;
        }
        .thankyou .wave {
            font-size: 2em;
            animation: wave 1s infinite alternate;
        }
        @keyframes wave {
            0% { transform: rotate(0deg);}
            100% { transform: rotate(20deg);}
        }
    </style>
</head>
<body>
    <button type="submit" onclick=window.location.href='Home.html'>Exit</button>
    <div class="container">
        <h1>Impresed with Sample Template ?| Contact Us </h1>
        <form id="contactForm" onsubmit="showThankYou(event)">
            <input type="text" name="name" placeholder="Your Name" required><br>
            <input type="text" name="org" placeholder="Organization Name" required><br>
            <input type="text" name="whatsapp" placeholder="WhatsApp Number" required><br>
            <input type="email" name="email" placeholder="Email" required><br>
            <button type="submit">Send</button>
        </form>
        <div class="thankyou" id="thankYouMsg">
            <div class="wave">👋</div>
            <h2>Thank you for contacting us!</h2>
            <p>We appreciate your interest. We'll get back to you soon.</p>
        </div>
    </div>
    <script>
        function showThankYou(e) {
            e.preventDefault();
            document.getElementById('contactForm').style.display = 'none';
            document.getElementById('thankYouMsg').style.display = 'block';
        }
    </script>
</body>
<footer>
  <p>&copy; 2025   Digital Marketer All rights reserved.</p>
  <p>Contact us <a href="contact.html">here</a></p>
</footer>
</html>
